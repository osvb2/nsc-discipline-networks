  window.__globalTooltipTextBox40ReductionV2Applied = true;

  function forceSmallTooltip(tip){
    if (!tip) return;
    tip.style.setProperty('width', '264px', 'important');
    tip.style.setProperty('max-width', '264px', 'important');
    tip.style.setProperty('min-width', '156px', 'important');
    tip.style.setProperty('max-height', '336px', 'important');
    tip.style.setProperty('overflow-y', 'auto', 'important');
    tip.style.setProperty('overflow-x', 'hidden', 'important');
    tip.style.setProperty('white-space', 'normal', 'important');
    tip.style.setProperty('font-size', '6.6px', 'important');
    tip.style.setProperty('line-height', '1.12', 'important');
    tip.style.setProperty('padding', '4.8px 5.4px', 'important');
    tip.style.setProperty('box-sizing', 'border-box', 'important');

    tip.querySelectorAll('*').forEach(function(el){
      var tag = (el.tagName || '').toLowerCase();
      var px = '6.6px';
      if (tag === 'h1' || tag === 'h2') px = '7.92px';
      if (tag === 'h3') px = '7.08px';
      el.style.setProperty('font-size', px, 'important');
      el.style.setProperty('line-height', '1.12', 'important');
      el.style.setProperty('max-width', '100%', 'important');
      el.style.setProperty('white-space', 'normal', 'important');
      el.style.setProperty('overflow-wrap', 'anywhere', 'important');
      el.style.setProperty('word-break', 'break-word', 'important');
      el.style.setProperty('box-sizing', 'border-box', 'important');
    });
  }

  function run(){
    document.querySelectorAll('.vis-tooltip').forEach(forceSmallTooltip);
  }

  document.addEventListener('mousemove', function(){ setTimeout(run, 1); }, true);
  document.addEventListener('mouseover', function(){ setTimeout(run, 1); }, true);
  new MutationObserver(run).observe(document.body, { childList: true, subtree: true });
  setInterval(run, 200);
})();
</script>
<!-- /GLOBAL_TOOLTIP_TEXT_AND_BOX_40_PERCENT_REDUCTION_V2 -->

</body>
</html>
